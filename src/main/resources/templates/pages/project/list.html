<div class="col-md-6">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Список проектов</h3>
            <div class="card-tools">
                <a th:href="@{/projects/create}" class="btn btn-block btn-outline-primary btn-sm">Создать проект</a>
            </div>
        </div>

        <div class="card-body">
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th style="width: 10px">#</th>
                    <th>Название</th>
                    <th style="width: 40px">Статус</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="p : ${projects}">
                    <td th:text="${p.id}"></td>
                    <td>
                        <a th:href="@{/projects/{id}(id=${p.id})}"
                           th:text="${p.name}">
                        </a>
                    </td>
                    <td th:text="${p.status.label}"></td>

                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
