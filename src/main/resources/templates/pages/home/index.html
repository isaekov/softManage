

<h3>Общая статистика</h3>

<div class="row">
    <div class="col-lg-3 col-6">
        <!-- small box -->
        <div class="small-box bg-info">
            <div class="inner">
                <h3 th:text="${total}"></h3>

                <p>Всего задач</p>
            </div>
            <div class="icon">
                <i class="ion ion-bag"></i>
            </div>

        </div>
    </div>
    <!-- ./col -->
    <div class="col-lg-3 col-6">
        <!-- small box -->
        <div class="small-box bg-danger">
            <div class="inner">
                <h3 th:text="${newTasks}"></h3>

                <p>Новые</p>
            </div>
            <div class="icon">
                <i class="ion ion-stats-bars"></i>
            </div>

        </div>
    </div>
    <!-- ./col -->
    <div class="col-lg-3 col-6">
        <!-- small box -->
        <div class="small-box bg-purple">
            <div class="inner">
                <h3 th:text="${inProgress}"></h3>

                <p>В работе</p>
            </div>
            <div class="icon">
                <i class="ion ion-person-add"></i>
            </div>

        </div>
    </div>
    <!-- ./col -->
    <div class="col-lg-3 col-6">
        <!-- small box -->
        <div class="small-box bg-success">
            <div class="inner">
                <h3 th:text="${done}"></h3>

                <p>Готово</p>
            </div>
            <div class="icon">
                <i class="ion ion-pie-graph"></i>
            </div>

        </div>
    </div>

    <div class="col-lg-3 col-6">
        <!-- small box -->
        <div class="small-box bg-warning">
            <div class="inner">
                <h3 th:text="${done}"></h3>

                <p>Приостановлено</p>
            </div>
            <div class="icon">
                <i class="ion ion-pie-graph"></i>
            </div>

        </div>
    </div>
    <!-- ./col -->
</div>
<br/>

<h3>Задачи по пользователям</h3>

<div class="card card-danger">
    <div class="card-header">
        <h3 class="card-title">Статистика</h3>

        <div class="card-tools">
            <button type="button" class="btn btn-tool" data-card-widget="collapse">
                <i class="fas fa-minus"></i>
            </button>
            <button type="button" class="btn btn-tool" data-card-widget="remove">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="chartjs-size-monitor">
            <div class="chartjs-size-monitor-expand">
                <div class=""></div>
            </div>
            <div class="chartjs-size-monitor-shrink">
                <div class=""></div>
            </div>
        </div>
        <canvas id="donutChart"
                style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%; display: block; width: 690px;"
                width="690" height="250" class="chartjs-render-monitor"></canvas>
    </div>
    <!-- /.card-body -->
</div>

<a href="/tasks">Назад</a>
<th:block th:fragment="scripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            let data = [[${tasksByUser}]];
            let labels = Object.keys(data);
            let values = Object.values(data);

            // Расширенная палитра в стиле AdminLTE (10 цветов, зацикливается автоматически)
            const palette = [
                '#17a2b8', '#dc3545', '#605ca8', '#28a745', '#ffc107',
                '#007bff', '#fd7e14', '#20c997', '#e83e8c', '#6c757d'
            ];

            var donutChartCanvas = $('#donutChart').get(0).getContext('2d');
            var donutData = {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: palette,
                    borderWidth: 1,
                    borderColor: '#ffffff'
                }]
            };
            var donutOptions = {
                maintainAspectRatio: false,
                responsive: true,
                legend: { position: 'bottom', labels: { boxWidth: 12 } },
                cutoutPercentage: 60
            };

            new Chart(donutChartCanvas, {
                type: 'doughnut',
                data: donutData,
                options: donutOptions
            });
        });
    </script>
</th:block>
