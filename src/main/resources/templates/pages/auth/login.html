<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SoftManage — Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #6a6a80, #1a1b22);
            color: #e2e4eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #2e303d;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
            padding: 2.5rem;
            border: 1px solid #2d2e3b;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.6rem;
        }

        .logo h1 {
            font-size: 1.85rem;
            font-weight: 600;
            color: #f0f1f7;
            letter-spacing: -0.4px;
        }

        .slogan {
            text-align: center;
            color: #a0a4b8;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.3rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: #c5c8d6;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #3a3c4a;
            border-radius: 8px;
            background: #252631;
            color: #e6e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #5a66ff;
        }

        /* ——— БЛЕДНАЯ СОВРЕМЕННАЯ КНОПКА (тёмная тема) ——— */
        .login-button {
            width: 100%;
            padding: 0.85rem;
            background: #2a2b38;
            border: 1px solid #3a3b4a;
            border-radius: 10px;
            color: #e0e2ec;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        .login-button:hover {
            background: #2f303d;
            border-color: #454655;
        }

        .login-button:active {
            transform: translateY(1px);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1.8rem;
            }
            .logo h1 {
                font-size: 1.65rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>SoftManage</h1>
    </div>
    <p class="slogan">Профессиональное управление разработкой</p>
    <form th:action="@{/login}" method="post">

    <div class="input-group">
            <label for="username">Логин или email</label>
            <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="input-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="login-button">Войти</button>
    </form>
</div>
</body>
</html>
