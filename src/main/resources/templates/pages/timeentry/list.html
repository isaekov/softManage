<div class="col-md-6">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Учёт времени</h3>
            <div class="card-tools">
                <a th:href="@{/time/create}" class="btn btn-block btn-outline-primary btn-sm">Добавить запись</a>
            </div>
        </div>

        <div class="card-body">
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th style="width: 10px">#</th>
                    <th>Дата</th>
                    <th>Часы</th>
                    <th>Задача</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${entries}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.workDate}"></td>
                    <td th:text="${t.hours}"></td>
                    <td th:text="${t.task.title}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
