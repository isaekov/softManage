<div class="col-md-6">
<div class="card card-primary">
    <div class="card-header">
        <h3 class="card-title">Добавить время</h3>
    </div>

    <form th:action="@{/time/create}" method="post" th:object="${entry}">

        <div class="card-body">
            <div class="form-group">
                <label for="exampleInputEmail1">Дата</label>
                <input type="text" th:field="*{workDate}" class="form-control" id="exampleInputEmail1">
            </div>
            <div class="form-group">
                <label for="exampleInputPassword1">Часы</label>
                <input type="number" th:field="*{hours}" class="form-control" id="exampleInputPassword1">
            </div>


            <div class="form-group">
                <label for="exampleSelectRounded0">Задача</label>
                <select th:field="*{task}" class="custom-select rounded-0" id="exampleSelectRounded0">
                    <option th:each="t : ${tasks}"
                            th:value="${t.id}"
                            th:text="${t.title}">
                    </option>
                </select>
            </div>

        </div>

        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
    </form>
</div>
</div>
