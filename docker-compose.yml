version: '3.8'
services:

  app:
    build: .
    container_name: course-app
    ports:
      - "8080:9999"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Подключаемся к сервису 'postgres' (имя сервиса работает как хост)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-soft}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-123}
      # Для курсового удобно использовать 'update', чтобы таблицы создались сами
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres
    networks:
      - postgres
    restart: unless-stopped


  postgres:
    container_name: postgres
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-soft}
      PGDATA: /var/lib/postgresql/data
    volumes:
      # Локальное хранилище (не коммитим в Git!)
      - ./postgres/data:/var/lib/postgresql/data
      # Автоматическое восстановление при первом запуске
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - postgres
    restart: unless-stopped

networks:
    postgres:
      driver: bridge

